<!-- ===== SLIDER ===== -->
<div class="flex justify-center bg-black py-6 px-4">
  <div class="relative w-full max-w-5xl aspect-video overflow-hidden rounded-xl shadow-lg">
    @for (img of images; track $index; let i = $index) {
      <!-- ===== เช็คค่า i กับ currentIndex ที่ส่งเข้ามาว่าตรงกันรึ้เปล่า ถ้าไม่ตรงก็จะfadeออก ===== -->

      <div
        class="absolute inset-0 transition-opacity duration-700 ease-in-out"
        [ngClass]="{ 
          'opacity-100 z-10': i === currentIndex, 
          'opacity-0 z-0': i !== currentIndex,
        }"
      >
        <img [src]="img" class="w-full h-full object-cover" />
        <div class="absolute bottom-5 left-1/2 -translate-x-1/2 flex gap-3 z-20">
          @for (img of images; track $index; let i = $index) {
            <button
              (click)="goToSlide(i)"
              class="w-3 h-3 rounded-full transition-all duration-300"
              [ngClass]="{
                'bg-gray-300 scale-125': i === currentIndex,
                'bg-white/50': i !== currentIndex,
              }"
            ></button>
          }
        </div>
      </div>
    }

    <!-- Prev -->
    <button
      (click)="prev()"
      class="absolute left-2 md:left-4 top-1/2 -translate-y-1/2 bg-black/40 hover:bg-black/60 text-white p-2 md:px-3 md:py-2 rounded-full z-20 transition"
    >
      ‹
    </button>

    <!-- Next -->
    <button
      (click)="next()"
      class="absolute right-2 md:right-4 top-1/2 -translate-y-1/2 bg-black/40 hover:bg-black/60 text-white p-2 md:px-3 md:py-2 rounded-full z-20 transition"
    >
      ›
    </button>
  </div>
</div>
