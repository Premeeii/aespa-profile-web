<!-- ===== SLIDER ===== -->
<div class="relative w-full h-[40vh] md:h-screen overflow-hidden">
  
  @for (img of images; track $index; let i = $index) {
    <div
      class="absolute inset-0 transition-opacity duration-1000 ease-in-out"
      [ngClass]="{
        'opacity-100 z-10': i === currentIndex,
        'opacity-0 z-0': i !== currentIndex,
      }"
    >
      <!-- Background Image -->
      <img [src]="img" class="absolute inset-0 w-full h-full object-cover" />

      <!-- Dark Overlay -->
      <div class="absolute inset-0 bg-black/20"></div>
    </div>
  }
  <div
    class="absolute inset-0 flex flex-col items-center justify-center text-white text-center z-20 px-4"
  >
    <img src="aespa-logo.png" class="w-30 md:w-100"/>
  </div>
  <!-- Fade Bottom Effect -->
  <div
    class="absolute bottom-0 left-0 w-full h-5 md:h-80 bg-linear-to-b from-transparent to-black z-20"
  ></div>
</div>
