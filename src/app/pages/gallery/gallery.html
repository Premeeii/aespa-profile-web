@if (selectedImage) {
  <div
    class="fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center z-50 animate-fadeIn"
    (click)="closeModal()"
  >
    <div class="relative max-w-3xl w-full p-4" (click)="$event.stopPropagation()">
      <!-- Image -->
      <div>
        <img [src]="selectedImage" class="w-full max-h-[90vh] object-contain rounded-xl" />
        <button
          (click)="closeModal()"
          class="absolute -top-5 right-4 md:top-4 md:right-25 xl:right-18 2xl:-right-5 text-white text-3xl"
        >
          ✕
        </button>
      </div>
    </div>
  </div>
}
