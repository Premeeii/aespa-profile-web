@if (selectedImage) {
  <div
    class="fixed inset-0 bg-black/80 flex items-center justify-center z-100"
    (click)="closeModal()"
  >
    <div class="relative max-w-3xl w-full p-4" (click)="$event.stopPropagation()">
      <!-- Close Button -->
      <button (click)="closeModal()" class="absolute -top-5 right-4 md:top-4 md:right-35 text-white text-3xl">✕</button>

      <!-- Image -->
      <img [src]="selectedImage" class="w-full max-h-[90vh] object-contain rounded-xl" />
    </div>
  </div>
}
