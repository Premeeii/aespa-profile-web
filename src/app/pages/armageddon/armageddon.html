<div class="bg-black min-h-screen text-white px-6 md:px-20 py-25">
  <!-- TOP SECTION -->
  <div class="flex flex-col md:flex-row gap-8 items-center md:items-start">
    <!-- Album Cover -->
    <img src="armageddon.jpg" class="w-48 sm:w-64 md:w-72 lg:w-80 rounded-2xl shadow-2xl" />

    <!-- Album Info -->
    <div class="text-center md:text-left">
      <h1 class="text-2xl sm:text-3xl md:text-5xl font-semibold">Armageddon - The 1st Album</h1>
      <p class="text-gray-400 mt-2 text-sm sm:text-base md:text-lg">Release: 27 May 2024</p>
    </div>
  </div>

  <!-- TRACK LIST -->
  <div class="mt-10">
    <h2 class="text-lg md:text-2xl font-semibold mb-6 border-b border-gray-700 pb-2">Track List</h2>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-y-3 text-base sm:text-lg md:text-2xl">
      @for (track of tracks; track $index) {
        <a
          [href]="track.url"
          target="_blank"
          rel="noopener noreferrer"
          class="block hover:text-blue-300 transition-colors cursor-pointer"
        >
          {{ $index + 1 }}. {{ track.title }}
        </a>
      }
    </div>
  </div>
</div>
